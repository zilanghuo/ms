<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>需求二：订单明细与销量趋势 — Demo</title>
  <style>
    :root { --bg: #f5f6f8; --card: #fff; --text: #333; --muted: #666; --accent: #0d9488; --accent-hover: #0f766e; --border: #e0e0e0; --input-border: #d1d5db; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; margin: 0; padding: 1.5rem; font-size: 14px; }
    .container { max-width: 100%; margin: 0 auto; }
    .page-title { font-size: 1.25rem; font-weight: 600; margin: 0 0 1.5rem; color: var(--text); }
    .shop-label { font-size: 1rem; font-weight: 600; color: var(--accent); margin-bottom: 1rem; }
    .query-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .query-row { display: flex; flex-wrap: wrap; gap: 1rem 1.5rem; align-items: center; }
    .query-item { display: flex; align-items: center; gap: 0.35rem; }
    .query-item .label { color: var(--text); font-size: 0.9rem; white-space: nowrap; }
    .query-item select { border: 1px solid var(--input-border); border-radius: 4px; padding: 0.4rem 0.6rem; font-size: 0.9rem; color: var(--text); background: #fff; min-width: 200px; cursor: pointer; }
    .query-item input[type="date"] { border: 1px solid var(--input-border); border-radius: 4px; padding: 0.4rem 0.6rem; font-size: 0.9rem; color: var(--text); background: #fff; }
    .query-actions { margin-left: auto; display: flex; gap: 0.5rem; }
    .btn { border-radius: 4px; padding: 0.45rem 1rem; font-size: 0.9rem; cursor: pointer; border: 1px solid transparent; }
    .btn-query { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-query:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-secondary { background: #fff; color: var(--text); border-color: var(--input-border); }
    .btn-secondary:hover { background: #f9fafb; }
    .action-bar { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; display: flex; flex-wrap: wrap; align-items: flex-start; gap: 1rem; }
    .action-bar .btns { display: flex; gap: 0.5rem; }
    .export-tip { flex: 1; min-width: 280px; padding: 0.5rem 0.75rem; border: 1px solid #dc2626; border-radius: 4px; background: #fef2f2; font-size: 0.8rem; color: #991b1b; }
    .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 1rem; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 900px; }
    th, td { padding: 0.5rem 0.65rem; text-align: left; border: 1px solid var(--border); white-space: nowrap; }
    th { background: #f9fafb; color: var(--muted); font-weight: 500; }
    tr:hover td { background: #f9fafb; }
    td { color: var(--text); }
    .spu-row td { background: #fef9c3; font-weight: 600; }
    .spu-row:hover td { background: #fef08a; }
    .diff-neg { color: #dc2626; font-weight: 500; }
    .empty-tip { padding: 2rem; text-align: center; color: var(--muted); font-size: 0.9rem; }
    .pagination { padding: 0.6rem 1rem; border-top: 1px solid var(--border); background: #f9fafb; display: flex; align-items: center; justify-content: flex-end; gap: 0.75rem; font-size: 0.85rem; }
    .pagination .info { color: var(--muted); margin-right: auto; }
    .pagination .btn { padding: 0.35rem 0.65rem; min-width: 60px; }
    .pagination .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .back { font-size: 0.85rem; margin-top: 1rem; }
    .back a { color: var(--accent); text-decoration: none; }
    .back a:hover { text-decoration: underline; }
    .spu-cell { display: inline-flex; align-items: center; gap: 0.35rem; }
    .btn-ai-spu { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; padding: 0; border: none; border-radius: 6px; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); color: #fff; cursor: pointer; flex-shrink: 0; }
    .btn-ai-spu:hover { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
    .btn-ai-spu svg { width: 14px; height: 14px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
    .modal-overlay.visible { display: flex; }
    .modal-box { background: #fff; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 480px; width: 100%; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
    .modal-header { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: linear-gradient(180deg, #f5f3ff 0%, #ede9fe 100%); }
    .modal-header .title { font-weight: 600; color: #5b21b6; font-size: 0.95rem; display: flex; align-items: center; gap: 0.35rem; }
    .modal-header .title svg { width: 1.1em; height: 1.1em; }
    .modal-close { width: 28px; height: 28px; padding: 0; border: none; border-radius: 6px; background: #e9e5ff; color: #5b21b6; cursor: pointer; font-size: 1.1rem; line-height: 1; }
    .modal-close:hover { background: #ddd6fe; }
    .modal-body { padding: 1rem 1.25rem; overflow-y: auto; font-size: 0.9rem; line-height: 1.65; white-space: pre-wrap; color: var(--text); }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="page-title">订单明细与销量趋势</h1>
    <p class="shop-label" id="shopLabel">请选择店铺后查询</p>

    <div class="query-card">
      <div class="query-row">
        <div class="query-item">
          <span class="label">店铺</span>
          <select id="qStore">
            <option value="">请选择店铺</option>
            <option value="1店">一店（美区跨境1店）</option>
            <option value="2店">二店（美区跨境2店）</option>
            <option value="3店">三店（美区跨境3店）</option>
            <option value="英区">英区（英国直邮店）</option>
          </select>
        </div>
        <div class="query-item">
          <span class="label">到日期</span>
          <input type="date" id="qEndDate" title="表格右侧最后一列为该日" />
        </div>
        <div class="query-actions">
          <button type="button" class="btn btn-query" id="btnQuery">查询</button>
          <button type="button" class="btn btn-secondary" id="btnReset">重置</button>
        </div>
      </div>
    </div>

    <div class="action-bar">
      <div class="btns">
        <button type="button" class="btn btn-secondary" id="btnExport">导出</button>
      </div>
      <div class="export-tip">
        导出字段：店铺名、SPU(公式)、PID、7 天日期（计数项: SKU sold quantity in the order.）、近两天差异。每个 SPU 行可点击「AI」进行该 SPU 维度的分析。
      </div>
    </div>

    <div class="table-card">
      <div class="table-wrap">
        <table id="resultTable">
          <thead>
            <tr>
              <th>店铺名</th>
              <th>SPU(公式)</th>
              <th>PID</th>
              <th colspan="7">计数项: SKU sold quantity in the order.</th>
              <th>近两天差异</th>
            </tr>
            <tr>
              <th></th>
              <th></th>
              <th></th>
              <th id="thDay0">2026/2/21</th>
              <th id="thDay1">2026/2/22</th>
              <th id="thDay2">2026/2/23</th>
              <th id="thDay3">2026/2/24</th>
              <th id="thDay4">2026/2/25</th>
              <th id="thDay5">2026/2/26</th>
              <th id="thDay6">2026/2/27</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="resultBody">
            <tr><td colspan="11" class="empty-tip">请选择店铺后点击「查询」</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <p class="back"><a href="../需求文档.html">← 返回需求文档</a></p>
  </div>

  <div class="modal-overlay" id="aiModal" role="dialog" aria-modal="true" aria-labelledby="aiModalTitle">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="title" id="aiModalTitle"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L9.5 8.5L3 9l5 4.5L6.5 21L12 17l5.5 4-1.5-7.5L21 9l-6.5-.5L12 2z"/></svg>AI 分析</span>
        <button type="button" class="modal-close" id="aiModalClose" aria-label="关闭">&times;</button>
      </div>
      <div class="modal-body" id="aiModalBody"></div>
    </div>
  </div>
  <script>
    (function() {
      var DEFAULT_DAYS = ['2026/2/21', '2026/2/22', '2026/2/23', '2026/2/24', '2026/2/25', '2026/2/26', '2026/2/27'];

      function getDays() {
        var endVal = document.getElementById('qEndDate').value;
        if (!endVal) return DEFAULT_DAYS.slice();
        var d = new Date(endVal + 'T12:00:00');
        var out = [];
        for (var i = 6; i >= 0; i--) {
          var x = new Date(d);
          x.setDate(x.getDate() - i);
          out.push(x.getFullYear() + '/' + (x.getMonth() + 1) + '/' + x.getDate());
        }
        return out;
      }

      // 按店铺 -> SPU -> PIDs 的 mock 数据（7 天销量 + 近两天差异）
      var byShop = {
        '1店': [
          { spu: 'AL-W0161', total: [122, 119, 98, 105, 88, 95, 82], diff: -13, pids: [
            { pid: '1729439482671567205', days: [2, 81, 33, 3, 3, 8, 5], diff: -3 },
            { pid: '1729773126172578149', days: [81, 20, 45, 70, 60, 55, 50], diff: -5 },
            { pid: '1729416165725475173', days: [33, 15, 18, 28, 22, 28, 24], diff: -4 },
            { pid: '1729380011223344556', days: [3, 3, 2, 2, 3, 2, 3], diff: 1 }
          ]},
          { spu: 'AL-W0180', total: [56, 62, 58, 70, 65, 72, 67], diff: -5, pids: [
            { pid: '1731657241623302501', days: [40, 35, 30, 45, 40, 45, 42], diff: -3 },
            { pid: '1731657241623302502', days: [16, 27, 28, 25, 25, 27, 25], diff: -2 }
          ]},
          { spu: 'AL-W0169', total: [88, 92, 85, 90, 88, 95, 57], diff: -38, pids: [
            { pid: '1729355500112233445', days: [50, 52, 48, 50, 48, 52, 30], diff: -22 },
            { pid: '1729322000112233444', days: [38, 40, 37, 40, 40, 43, 27], diff: -16 }
          ]},
          { spu: 'AL-W5558', total: [45, 48, 42, 50, 48, 52, 48], diff: -4, pids: [
            { pid: '1729300000112233443', days: [45, 48, 42, 50, 48, 52, 48], diff: -4 }
          ]}
        ],
        '2店': [
          { spu: 'AL-W0161', total: [30, 32, 28, 35, 33, 36, 34], diff: -2, pids: [
            { pid: '1729439482671567205', days: [18, 20, 16, 22, 20, 22, 21], diff: -1 },
            { pid: '1729773126172578149', days: [12, 12, 12, 13, 13, 14, 13], diff: -1 }
          ]}
        ],
        '3店': [
          { spu: 'ALYMX-DROPSW', total: [20, 22, 19, 24, 21, 23, 20], diff: -3, pids: [
            { pid: '1729416165725475173', days: [12, 14, 11, 15, 12, 14, 12], diff: -2 },
            { pid: '1729380011223344556', days: [8, 8, 8, 9, 9, 9, 8], diff: -1 }
          ]}
        ],
        '英区': [
          { spu: 'AL-W0161', total: [15, 16, 14, 18, 16, 17, 16], diff: -1, pids: [
            { pid: '1729439482671567205', days: [15, 16, 14, 18, 16, 17, 16], diff: -1 }
          ]}
        ]
      };

      var shopNames = { '1店': '一店', '2店': '二店', '3店': '三店', '英区': '英区' };

      function getFiltered() {
        var store = document.getElementById('qStore').value;
        if (!store || !byShop[store]) return null;
        return { store: store, name: shopNames[store], list: byShop[store] };
      }

      function render(data) {
        var tbody = document.getElementById('resultBody');
        var label = document.getElementById('shopLabel');
        if (!data || !data.list.length) {
          label.textContent = '请选择店铺后查询';
          tbody.innerHTML = '<tr><td colspan="11" class="empty-tip">请选择店铺后点击「查询」</td></tr>';
          return;
        }
        label.textContent = data.name;

        var DAYS = getDays();
        for (var i = 0; i < 7; i++) {
          var th = document.getElementById('thDay' + i);
          if (th) th.textContent = DAYS[i];
        }

        var totalRows = 0;
        data.list.forEach(function(group) {
          totalRows += 1 + group.pids.length;
        });

        var html = '';
        var firstRow = true;
        data.list.forEach(function(group, gidx) {
          var rowspan = 1 + group.pids.length;
          html += '<tr class="spu-row">';
          if (firstRow) {
            html += '<td rowspan="' + totalRows + '">' + data.name + '</td>';
            firstRow = false;
          }
          html += '<td rowspan="' + rowspan + '"><span class="spu-cell"><span class="spu-name">' + group.spu + '</span> <button type="button" class="btn-ai-spu" data-gidx="' + gidx + '" title="AI 分析（' + group.spu + '）"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L9.5 8.5L3 9l5 4.5L6.5 21L12 17l5.5 4-1.5-7.5L21 9l-6.5-.5L12 2z"/></svg></button></span></td>';
          html += '<td>小计</td>';
          group.total.forEach(function(v) { html += '<td>' + v + '</td>'; });
          html += '<td class="' + (group.diff < 0 ? 'diff-neg' : '') + '">' + (group.diff >= 0 ? '+' : '') + group.diff + '</td>';
          html += '</tr>';
          group.pids.forEach(function(p) {
            html += '<tr>';
            html += '<td>' + p.pid + '</td>';
            p.days.forEach(function(v) { html += '<td>' + v + '</td>'; });
            html += '<td class="' + (p.diff < 0 ? 'diff-neg' : '') + '">' + (p.diff >= 0 ? '+' : '') + p.diff + '</td>';
            html += '</tr>';
          });
        });
        tbody.innerHTML = html;

        var modal = document.getElementById('aiModal');
        var modalBody = document.getElementById('aiModalBody');
        function closeModal() { modal.classList.remove('visible'); }
        document.getElementById('aiModalClose').onclick = closeModal;
        modal.onclick = closeModal;

        tbody.querySelectorAll('.btn-ai-spu').forEach(function(btn) {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var gidx = parseInt(btn.getAttribute('data-gidx'), 10);
            var data = getFiltered();
            if (data && data.list[gidx]) {
              modalBody.textContent = generateAiAnalysisForSpu(data.list[gidx], data.name, getDays());
              document.getElementById('aiModalTitle').innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L9.5 8.5L3 9l5 4.5L6.5 21L12 17l5.5 4-1.5-7.5L21 9l-6.5-.5L12 2z"/></svg>AI 分析 · ' + data.list[gidx].spu;
              modal.classList.add('visible');
            }
          });
        });
      }

      function generateAiAnalysisForSpu(group, shopName, days) {
        days = days || DEFAULT_DAYS;
        var s6 = group.total[group.total.length - 2] || 0;
        var s7 = group.total[group.total.length - 1] || 0;
        var trend = s7 >= s6 ? '环比上升' : '环比下降';
        var d6 = days.length >= 2 ? days[days.length - 2] : '前日';
        var d7 = days.length >= 1 ? days[days.length - 1] : '当日';
        var parts = [];
        parts.push('【' + shopName + ' · ' + group.spu + '】近两日：' + d6 + ' 合计 ' + s6 + ' 件，' + d7 + ' 合计 ' + s7 + ' 件，' + trend + '；近两天差异 ' + (group.diff >= 0 ? '+' : '') + group.diff + '。');
        parts.push('共 ' + group.pids.length + ' 个 PID。');
        var negPids = group.pids.filter(function(p) { return p.diff < 0; });
        if (negPids.length) {
          parts.push('差异为负的 PID：' + negPids.map(function(p) { return p.pid.slice(-10) + '（' + p.diff + '）'; }).join('、') + '，建议关注库存或推广。');
        } else {
          parts.push('各 PID 近两天差异均非负，趋势平稳。');
        }
        parts.push('以上为基于该 SPU 数据的结构化摘要，可配合运营做补货或复盘。');
        return parts.join('\n\n');
      }

      function flattenForCSV(data) {
        if (!data || !data.list) return [];
        var rows = [];
        data.list.forEach(function(group) {
          rows.push([data.name, group.spu, '小计'].concat(group.total).concat([group.diff]));
          group.pids.forEach(function(p) {
            rows.push([data.name, group.spu, p.pid].concat(p.days).concat([p.diff]));
          });
        });
        return rows;
      }

      function toCSV(data) {
        var rows = flattenForCSV(data);
        if (!rows.length) return '';
        var DAYS = getDays();
        var headers = ['店铺名', 'SPU(公式)', 'PID'].concat(DAYS).concat(['近两天差异']);
        var lines = [headers.map(escapeCell).join(',')].concat(rows.map(function(row) {
          return row.map(escapeCell).join(',');
        }));
        return '\uFEFF' + lines.join('\n');
      }

      function escapeCell(v) {
        var s = String(v);
        if (s.indexOf('"') >= 0 || s.indexOf(',') >= 0 || s.indexOf('\n') >= 0) return '"' + s.replace(/"/g, '""') + '"';
        return s;
      }

      function doExport() {
        var data = getFiltered();
        if (!data || !data.list.length) {
          alert('请先选择店铺并点击「查询」后再导出');
          return;
        }
        var csv = toCSV(data);
        var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = '销量趋势_' + data.name + '.csv';
        a.click();
        URL.revokeObjectURL(a.href);
      }

      document.getElementById('btnQuery').onclick = function() { render(getFiltered()); };
      document.getElementById('btnReset').onclick = function() {
        document.getElementById('qStore').value = '';
        document.getElementById('qEndDate').value = '2026-02-27';
        document.getElementById('shopLabel').textContent = '请选择店铺后查询';
        document.getElementById('resultBody').innerHTML = '<tr><td colspan="11" class="empty-tip">请选择店铺后点击「查询」</td></tr>';
        for (var i = 0; i < 7; i++) {
          var th = document.getElementById('thDay' + i);
          if (th) th.textContent = DEFAULT_DAYS[i];
        }
      };
      document.getElementById('btnExport').onclick = doExport;

      document.getElementById('qStore').value = '1店';
      document.getElementById('qEndDate').value = '2026-02-27';
      render(getFiltered());
    })();
  </script>
</body>
</html>
